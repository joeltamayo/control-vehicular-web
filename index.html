<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="supervisión vehicular, flota, vehículos, gestión, monitoreo, control">
    <meta name="description" content="Sistema de supervisión vehicular para la gestión y monitoreo de flota de vehículos con control de documentos y registros de alumnos.">
    <title>Supervisión Vehicular</title>

    <!-- Estilos externos -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Estilos globales compartidos por todas las vistas -->
    <link rel="stylesheet" href="./Styles/main.css">

    <link rel="icon" href="./Media/Favicon_SV.png" type="image/x-icon">
</head>

<body class="bg-light">

    <!-- Contenedor donde el router renderiza cada vista -->
    <div id="app"></div>

    <!-- Modal feedback -->
    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title feedback-modal-title">Aviso</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <i class="feedback-modal-icon fas fa-info-circle text-primary fa-3x mb-3"></i>
                    <p class="feedback-modal-message mb-0"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Plugin de lectura QR para el escáner del guardia -->
    <script src="./Scripts/plugins/qrCode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Punto de entrada del SPA -->
    <script type="module" src="./Scripts/router.js"></script>
</body>

</html>
